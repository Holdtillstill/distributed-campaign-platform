global:
  imagePullPolicy: IfNotPresent
  awsRegion: us-west-2
  queue:
    provider: nats
    sqs:
      broadcastQueueUrl: ""
      retryQueueUrl: ""
      deadLetterQueueUrl: ""
      endpointUrl: ""
      sendBatchSize: "10"
      waitTimeSeconds: "20"
      maxNumberOfMessages: "10"
  nats:
    url: nats://campaign-platform-nats:4222
    subject: messages.dispatch
    retrySubject: messages.dispatch.retry
    deadLetterSubject: messages.dispatch.dead_letter
    stream: CAMPAIGN_MESSAGES
    useJetStream: "true"
  postgres:
    database: campaigns
    user: campaigns
    password: campaigns
    host: campaign-platform-postgres
    port: 5432

eks:
  enabled: false

readiness:
  requireDependencies: "true"

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext: {}

containerSecurityContext: {}

secrets:
  mode: helm
  existingSecretName: ""
  externalSecret:
    refreshInterval: 1h
    secretStoreRef:
      name: campaign-platform
      kind: ClusterSecretStore
    remoteRefs:
      databaseUrl:
        key: /campaign-platform/dev/database-url
      postgresDb:
        key: /campaign-platform/dev/postgres-db
      postgresUser:
        key: /campaign-platform/dev/postgres-user
      postgresPassword:
        key: /campaign-platform/dev/postgres-password

ingress:
  enabled: false
  className: alb
  annotations: {}
  hosts: []
  tls: []
  webUi:
    path: /
    pathType: Prefix

campaignApi:
  image:
    repository: campaign-api
    tag: local
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

providerSimulator:
  image:
    repository: provider-simulator
    tag: local
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  providerMode: success
  latencyMs: "0"
  failureRate: "0.0"

dispatcher:
  image:
    repository: dispatcher
    tag: local
  replicas: 1
  service:
    port: 8080
  durable: dispatcher
  maxAttempts: "3"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

webUi:
  image:
    repository: web-ui
    tag: local
  replicas: 1
  service:
    port: 80
  apiBaseUrl: ""
  campaignApiUpstream: http://campaign-platform-campaign-api:8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 192Mi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

observability:
  namespace: observability
  serviceMonitor:
    enabled: true
    interval: 15s
  alerts:
    enabled: true
    apiErrorRateThreshold: 0.05
    apiLatencyP95Seconds: 0.5
    natsPendingMessagesThreshold: 100
    natsAckPendingMessagesThreshold: 25
  otel:
    enabled: true
    endpoint: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317
    protocol: grpc

networkPolicy:
  enabled: true
  publicIngressCidrs: []

postgres:
  enabled: true
  image: postgres:16-alpine
  persistence:
    enabled: false
    storageClassName: ""
    size: 1Gi

redis:
  image: redis:7-alpine

nats:
  image: nats:2.10-alpine
  exporter:
    enabled: true
    image: natsio/prometheus-nats-exporter:0.20.0
    port: 7777
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
  persistence:
    enabled: false
    storageClassName: ""
    size: 1Gi
