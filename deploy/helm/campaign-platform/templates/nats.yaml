apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "campaign-platform.fullname" . }}-nats
  labels:
    {{- include "campaign-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  serviceName: {{ include "campaign-platform.fullname" . }}-nats
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "campaign-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - name: nats
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: nats-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz?js-enabled-only=true
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 15
            periodSeconds: 10
        {{- if .Values.nats.exporter.enabled }}
        - name: nats-exporter
          image: {{ .Values.nats.exporter.image | quote }}
          args:
            - -varz
            - -connz
            - -subz
            - -jsz=all
            - -healthz
            - http://localhost:8222
          ports:
            - name: metrics
              containerPort: {{ .Values.nats.exporter.port }}
          resources:
            {{- toYaml .Values.nats.exporter.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
        {{- end }}
      {{- if not .Values.nats.persistence.enabled }}
      volumes:
        - name: nats-data
          emptyDir: {}
      {{- end }}
  {{- if .Values.nats.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.nats.persistence.storageClassName }}
        storageClassName: {{ .Values.nats.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nats.persistence.size | quote }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "campaign-platform.fullname" . }}-nats
  labels:
    {{- include "campaign-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: nats
  ports:
    - name: nats
      port: 4222
      targetPort: nats
    - name: monitor
      port: 8222
      targetPort: monitor
    {{- if .Values.nats.exporter.enabled }}
    - name: metrics
      port: {{ .Values.nats.exporter.port }}
      targetPort: metrics
    {{- end }}
