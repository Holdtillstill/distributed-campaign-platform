apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "campaign-platform.fullname" . }}-nats
  labels:
    {{- include "campaign-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        {{- include "campaign-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: nats
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image | quote }}
          args: ["-js", "-m", "8222"]
          ports:
            - name: nats
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          readinessProbe:
            httpGet:
              path: /healthz?js-enabled-only=true
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "campaign-platform.fullname" . }}-nats
  labels:
    {{- include "campaign-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: nats
  ports:
    - name: nats
      port: 4222
      targetPort: nats
    - name: monitor
      port: 8222
      targetPort: monitor
