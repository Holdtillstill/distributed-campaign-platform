{{- if .Values.observability.serviceMonitor.enabled }}
{{- $root := . -}}
{{- range $service := list "campaign-api" "provider-simulator" "dispatcher" }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "campaign-platform.fullname" $root }}-{{ $service }}
  labels:
    {{- include "campaign-platform.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $service }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $service }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $root.Values.observability.serviceMonitor.interval }}
---
{{- end }}
{{- end }}
