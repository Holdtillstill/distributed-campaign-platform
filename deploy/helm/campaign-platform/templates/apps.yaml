{{- $root := . -}}
# Rendered components managed by this template:
# app.kubernetes.io/component: campaign-api
# app.kubernetes.io/component: dispatcher
# app.kubernetes.io/component: provider-simulator
# app.kubernetes.io/component: web-ui
{{- range $service := list
  (dict "component" "campaign-api" "values" .Values.campaignApi "env" "api")
  (dict "component" "provider-simulator" "values" .Values.providerSimulator "env" "provider")
  (dict "component" "dispatcher" "values" .Values.dispatcher "env" "dispatcher")
  (dict "component" "web-ui" "values" .Values.webUi "env" "web")
}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "campaign-platform.fullname" $root }}-{{ $service.component }}
  labels:
    {{- include "campaign-platform.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $service.component }}
spec:
  replicas: {{ $service.values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name }}
      app.kubernetes.io/component: {{ $service.component }}
  template:
    metadata:
      labels:
        {{- include "campaign-platform.labels" $root | nindent 8 }}
        app.kubernetes.io/component: {{ $service.component }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: {{ $service.component }}
          image: "{{ $service.values.image.repository }}:{{ $service.values.image.tag }}"
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ ternary 80 8080 (eq $service.component "web-ui") }}
          envFrom:
            - configMapRef:
                name: {{ include "campaign-platform.fullname" $root }}-app-config
            - secretRef:
                name: {{ include "campaign-platform.fullname" $root }}-app-env
          env:
            {{- if eq $service.component "dispatcher" }}
            - name: DISPATCHER_WORKER_ENABLED
              value: "true"
            {{- else if eq $service.component "web-ui" }}
            - name: CAMPAIGN_API_UPSTREAM
              value: {{ $root.Values.webUi.campaignApiUpstream | quote }}
            {{- else }}
            []
            {{- end }}
          resources:
            {{- toYaml $service.values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              {{- if eq $service.component "web-ui" }}
              path: /
              {{- else }}
              path: /readyz
              {{- end }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              {{- if eq $service.component "web-ui" }}
              path: /
              {{- else }}
              path: /healthz
              {{- end }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "campaign-platform.fullname" $root }}-{{ $service.component }}
  labels:
    {{- include "campaign-platform.labels" $root | nindent 4 }}
    app.kubernetes.io/component: {{ $service.component }}
spec:
  selector:
    app.kubernetes.io/instance: {{ $root.Release.Name }}
    app.kubernetes.io/component: {{ $service.component }}
  ports:
    - name: http
      port: {{ $service.values.service.port }}
      targetPort: http
---
{{- end }}
