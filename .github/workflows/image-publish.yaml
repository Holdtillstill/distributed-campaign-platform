name: Publish Images

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-west-2' }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: image-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: campaign-api
            dockerfile: apps/campaign-api/Dockerfile
            repository: distributed-campaign-platform/campaign-api
          - name: dispatcher
            dockerfile: apps/dispatcher/Dockerfile
            repository: distributed-campaign-platform/dispatcher
          - name: provider-simulator
            dockerfile: apps/provider-simulator/Dockerfile
            repository: distributed-campaign-platform/provider-simulator
          - name: web-ui
            dockerfile: apps/web-ui/Dockerfile
            repository: distributed-campaign-platform/web-ui
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:main
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:${{ github.sha }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push image
        run: |
          docker push "${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:main"
          docker push "${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:${{ github.sha }}"
