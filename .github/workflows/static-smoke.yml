name: Static Host Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SITE_URL: ${{ secrets.SITE_URL || 'https://distributed-campaign-platform.bozhi.dev' }}

jobs:
  smoke-static-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-ui/package-lock.json

      - name: Install browser smoke dependencies
        working-directory: apps/web-ui
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Smoke public static host
        run: WEB_BASE="${SITE_URL}" node scripts/smoke-static-host.mjs

      - name: Smoke browser rendering
        working-directory: apps/web-ui
        run: WEB_BASE="${SITE_URL}" npm run smoke:browser-host
