name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo:ro" \
            --entrypoint sh \
            ghcr.io/gitleaks/gitleaks:v8.16.3 \
            -c 'git config --global --add safe.directory /repo && gitleaks detect --source /repo --redact --verbose'

      - name: Block committed cloud identifiers
        run: |
          pattern='(arn:aws:[^[:space:]]*::[0-9]{12}|[0-9]{12}\.dkr\.ecr\.[^[:space:]]+|terraform-state-[0-9]{12}|aws_account_id[^[:space:]]*[0-9]{12}|account[[:space:]]+[0-9]{12}|hosted_zone_id[^[:space:]]*Z[A-Z0-9]{10,32})'
          if git grep -n -I -i -E "$pattern" -- .; then
            echo "Hardcoded cloud account identifiers found. Use GitHub variables, Terraform variables, or placeholders instead." >&2
            exit 1
          fi
