name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo:ro" \
            --entrypoint sh \
            ghcr.io/gitleaks/gitleaks:v8.16.3 \
            -c 'git config --global --add safe.directory /repo && gitleaks detect --source /repo --redact --verbose'
