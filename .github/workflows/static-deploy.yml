name: Deploy Static Web UI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/web-ui/**
      - deploy/cloudfront/**
      - scripts/deploy-static-edge-router.sh
      - scripts/smoke-static-host.mjs
      - scripts/validate-static-spa-router.mjs
      - .github/workflows/static-deploy.yml

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-west-2' }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  STATIC_SITE_BUCKET: ${{ secrets.STATIC_SITE_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
  CLOUDFRONT_FUNCTION_NAME: ${{ secrets.CLOUDFRONT_FUNCTION_NAME }}
  SITE_URL: ${{ secrets.SITE_URL || 'https://distributed-campaign-platform.bozhi.dev' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_ENABLE_PUBLIC_DESIGN_ROUTES: "false"

jobs:
  deploy-static-web-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-ui/package-lock.json

      - name: Check required deployment variables
        run: |
          : "${AWS_ROLE_TO_ASSUME:?Set Actions secret AWS_ROLE_TO_ASSUME}"
          : "${STATIC_SITE_BUCKET:?Set Actions secret STATIC_SITE_BUCKET}"
          : "${CLOUDFRONT_DISTRIBUTION_ID:?Set Actions secret CLOUDFRONT_DISTRIBUTION_ID}"
          : "${CLOUDFRONT_FUNCTION_NAME:?Set Actions secret CLOUDFRONT_FUNCTION_NAME}"
          : "${SITE_URL:?Set Actions secret SITE_URL}"

      - name: Install web dependencies
        working-directory: apps/web-ui
        run: npm ci

      - name: Validate static edge router
        run: node scripts/validate-static-spa-router.mjs

      - name: Test and build web UI
        working-directory: apps/web-ui
        run: |
          npm test -- --run
          npm run build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Publish and associate static edge router
        run: scripts/deploy-static-edge-router.sh

      - name: Sync static web assets
        run: |
          aws s3 sync apps/web-ui/dist/ "s3://${STATIC_SITE_BUCKET}" \
            --delete \
            --exclude "assets/*" \
            --cache-control "public,max-age=300"
          aws s3 sync apps/web-ui/dist/assets/ "s3://${STATIC_SITE_BUCKET}/assets/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"

      - name: Smoke deployed static host
        run: WEB_BASE="${SITE_URL}" node scripts/smoke-static-host.mjs
