name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-build-and-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-ui/package-lock.json

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Install uv
        run: python -m pip install uv

      - name: Python tests
        run: uv run pytest

      - name: Web UI tests
        working-directory: apps/web-ui
        run: |
          npm ci
          npm test -- --run
          npm run build

      - name: Helm lint and render
        run: |
          helm lint deploy/helm/campaign-platform
          helm template campaign-platform deploy/helm/campaign-platform >/tmp/campaign-platform.yaml
          helm template campaign-platform deploy/helm/campaign-platform \
            -f deploy/helm/campaign-platform/values-eks-dev.yaml \
            --set campaignApi.image.repository=123456789012.dkr.ecr.us-west-2.amazonaws.com/campaign-api \
            --set providerSimulator.image.repository=123456789012.dkr.ecr.us-west-2.amazonaws.com/provider-simulator \
            --set dispatcher.image.repository=123456789012.dkr.ecr.us-west-2.amazonaws.com/dispatcher \
            --set webUi.image.repository=123456789012.dkr.ecr.us-west-2.amazonaws.com/web-ui \
            >/tmp/campaign-platform-eks.yaml

      - name: Docker images build
        run: |
          docker build -t campaign-api:ci -f apps/campaign-api/Dockerfile .
          docker build -t dispatcher:ci -f apps/dispatcher/Dockerfile .
          docker build -t provider-simulator:ci -f apps/provider-simulator/Dockerfile .
          docker build -t web-ui:ci -f apps/web-ui/Dockerfile .
