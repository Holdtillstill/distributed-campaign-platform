        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: docker
    directory: /apps/dispatcher
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      dispatcher-docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: docker
    directory: /apps/provider-simulator
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      provider-docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: docker
    directory: /apps/web-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      web-docker-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: terraform
    directory: /infra/terraform/environments/dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      terraform-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
