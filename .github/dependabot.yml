version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      python-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: npm
    directory: /apps/web-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      web-ui-npm-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /apps/campaign-api
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      campaign-api-docker-base:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /apps/dispatcher
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      dispatcher-docker-base:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /apps/provider-simulator
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      provider-simulator-docker-base:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: docker
    directory: /apps/web-ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      web-ui-docker-base:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: terraform
    directory: /infra/terraform/environments/dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    groups:
      terraform-dev:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
