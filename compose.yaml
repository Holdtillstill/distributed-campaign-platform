services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-campaign_local}
      POSTGRES_USER: ${POSTGRES_USER:-campaign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campaign}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://127.0.0.1:8222/healthz?js-enabled-only=true' | grep -q 'ok'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  campaign-api:
    build:
      context: .
      dockerfile: apps/campaign-api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-campaign}:${POSTGRES_PASSWORD:-campaign}@postgres:5432/${POSTGRES_DB:-campaign_local}
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: messages.dispatch
      NATS_STREAM: CAMPAIGN_MESSAGES
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  provider-simulator:
    build:
      context: .
      dockerfile: apps/provider-simulator/Dockerfile
    environment:
      PROVIDER_MODE: ${PROVIDER_MODE:-success}
      PROVIDER_LATENCY_MS: ${PROVIDER_LATENCY_MS:-0}
      PROVIDER_FAILURE_RATE: ${PROVIDER_FAILURE_RATE:-0.0}
    ports:
      - "127.0.0.1:8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  web-ui:
    build:
      context: .
      dockerfile: apps/web-ui/Dockerfile
    environment:
      CAMPAIGN_API_UPSTREAM: http://campaign-api:8080
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      campaign-api:
        condition: service_healthy

  dispatcher:
    build:
      context: .
      dockerfile: apps/dispatcher/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-campaign}:${POSTGRES_PASSWORD:-campaign}@postgres:5432/${POSTGRES_DB:-campaign_local}
      NATS_URL: nats://nats:4222
      NATS_SUBJECT: messages.dispatch
      NATS_RETRY_SUBJECT: messages.dispatch.retry
      NATS_DEAD_LETTER_SUBJECT: messages.dispatch.dead_letter
      NATS_STREAM: CAMPAIGN_MESSAGES
      DISPATCHER_MAX_ATTEMPTS: ${DISPATCHER_MAX_ATTEMPTS:-3}
      PROVIDER_URL: http://provider-simulator:8080
      DISPATCHER_WORKER_ENABLED: "true"
    ports:
      - "127.0.0.1:8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      provider-simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

volumes:
  postgres_data:
  nats_data:
