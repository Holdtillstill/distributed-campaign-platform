tempo:
  retention: 72h
  metricsGenerator:
    enabled: true
    remoteWriteUrl: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
    processor:
      local_blocks:
        flush_to_storage: true
        filter_server_spans: false
      service_graphs:
        wait: 10s
        max_items: 10000
      span_metrics:
        enable_target_info: true
    registry:
      collection_interval: 15s
    storage:
      path: /tmp/tempo
    traces_storage:
      path: /tmp/traces
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
          - local-blocks
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  storage:
    trace:
      backend: local
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

service:
  type: ClusterIP
